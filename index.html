<title>Архив стримов</title>

<style>
body{
    margin:0;
    background:#0f0f0f;
    font-family:Arial, sans-serif;
    color:white;
}
header{
    text-align:center;
    padding:20px;
    font-size:28px;
    background:#181818;
}
.grid{
    display:grid;
    grid-template-columns:repeat(4, 1fr);
    gap:20px;
    padding:20px;
}
.card{
    background:#1e1e1e;
    border-radius:12px;
    overflow:hidden;
    text-align:center;
    padding-bottom:15px;
    transition:0.2s;
}
.card:hover{
    transform:scale(1.03);
}
.thumb{
    width:100%;
    height:160px;
    background:#333;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:14px;
    color:#aaa;
}
.title{
    margin:12px 10px;
    font-size:16px;
}
button{
    padding:10px 15px;
    border:none;
    border-radius:6px;
    background:#ff0000;
    color:white;
    cursor:pointer;
}
button:hover{
    background:#cc0000;
}
</style>
</head>

<body>
