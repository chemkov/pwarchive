<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Архив стримов</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    color:white;
    overflow-x:hidden;
}

/* Плавающий размытый фон */
body::before{
    content:"";
    position:fixed;
    inset:-50%;
    background:linear-gradient(45deg, #000000, #1a1a1a, #ffd000, #000000);
    background-size:400% 400%;
    animation:bgMove 20s ease infinite;
    filter:blur(120px);
    z-index:-1;
}

@keyframes bgMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

header{
    text-align:center;
    padding:20px;
    font-size:28px;
    backdrop-filter:blur(6px);
}

.grid{
    display:grid;
    grid-template-columns:repeat(4, 1fr);
    gap:20px;
    padding:20px;
}

.card{
    background:rgba(30,30,30,0.7);
    border-radius:14px;
    overflow:hidden;
    text-align:center;
    transition:0.25s;
    cursor:pointer;
    text-decoration:none;
    color:white;
    backdrop-filter:blur(6px);
}

.card:hover{
    transform:scale(1.05);
}

.thumb{
    width:100%;
    height:160px;
    background:#333;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:14px;
    color:#aaa;
}

.title{
    padding:14px 10px;
    font-size:16px;
}
</style>
</head>

<body>

<header>📺 Архив стримов</header>

<div class="grid">

<!-- 20 карточек -->

<a class="card" href="#" target="_blank">
    <div class="thumb">Превью видео</div>
    <div class="title">ТЕСТ</div>
</a>

</a>

</div>

</body>
</html>
