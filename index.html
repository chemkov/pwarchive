<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    color:white;
    overflow-x:hidden;
    background:#000; /* глубокий чёрный */
}

/* Жидкий жёлто-чёрный фон */
body::before{
    content:"";
    position:fixed;
    inset:-35%;
    z-index:-1;

    background:
      radial-gradient(circle at 25% 35%, #ffd000 0%, transparent 35%),
      radial-gradient(circle at 75% 65%, #ffd000 0%, transparent 35%),
      radial-gradient(circle at 60% 20%, #000000 0%, transparent 55%),
      radial-gradient(circle at 20% 85%, #000000 0%, transparent 55%),
      #000000;

    filter: blur(140px) contrast(120%);
    animation: liquidMove 35s ease-in-out infinite alternate;
}

@keyframes liquidMove{
    0%{
        transform: translate(0%, 0%) scale(1);
    }
    50%{
        transform: translate(-6%, 4%) scale(1.12);
    }
    100%{
        transform: translate(6%, -4%) scale(1);
    }
}

header{
    text-align:center;
    padding:20px;
    font-size:28px;
    backdrop-filter:blur(6px);
}

.grid{
    display:grid;
    grid-template-columns:repeat(4, 1fr);
    gap:20px;
    padding:20px;
}

.card{
    background:rgba(20,20,20,0.75);
    border-radius:14px;
    overflow:hidden;
    text-align:center;
    transition:0.25s;
    cursor:pointer;
    text-decoration:none;
    color:white;
    backdrop-filter:blur(6px);
}

.card:hover{
    transform:scale(1.05);
}

.thumb{
    width:100%;
    height:160px;
    background:#222;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:14px;
    color:#aaa;
}

.title{
    padding:14px 10px;
    font-size:16px;
}
</style>
