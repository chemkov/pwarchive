<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Архив стримов</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    color:white;
    overflow-x:hidden;
    background:#000;
}

/* ЖЁЛТО-ЧЁРНЫЙ «жидкий» фон */
body::before{
    content:"";
    position:fixed;
    inset:-40%;
    z-index:-1;

    background:
      radial-gradient(circle at 30% 40%, #ffd000 0%, transparent 40%),
      radial-gradient(circle at 70% 60%, #ffd000 0%, transparent 40%),
      radial-gradient(circle at 50% 20%, #000 0%, transparent 50%),
      radial-gradient(circle at 20% 80%, #000 0%, transparent 50%),
      #000;

    filter: blur(120px);
    animation: liquidMove 18s ease-in-out infinite alternate;
}

@keyframes liquidMove{
    0%{
        transform: translate(0,0) scale(1);
    }
    50%{
        transform: translate(-5%, 5%) scale(1.1);
    }
    100%{
        transform: translate(5%, -5%) scale(1);
    }
}

header{
    text-align:center;
    padding:20px;
    font-size:28px;
    backdrop-filter:blur(6px);
}

.grid{
    display:grid;
    grid-template-columns:repeat(4, 1fr);
    gap:20px;
    padding:20px;
}

.card{
    background:rgba(30,30,30,0.7);
    border-radius:14px;
    overflow:hidden;
    text-align:center;
    transition:0.25s;
    cursor:pointer;
    text-decoration:none;
    color:white;
    backdrop-filter:blur(6px);
}

.card:hover{
    transform:scale(1.05);
}

.thumb{
    width:100%;
    height:160px;
    background:#333;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:14px;
    color:#aaa;
}

.title{
    padding:14px 10px;
    font-size:16px;
}
</style>
</head>

<body>

<header>📺 Архив стримов</header>

<div class="grid">

<a class="card" href="#" target="_blank">
    <div class="thumb">Превью видео</div>
    <div class="title">ТЕСТ</div>
</a>

<a class="card" href="#" target="_blank">
    <div class="thumb">Превью видео</div>
    <div class="title">ТЕСТ</div>
</a>

<a class="card" href="#" target="_blank">
    <div class="thumb">Превью видео</div>
    <div class="title">ТЕСТ</div>
</a>

<a class="card" href="#" target="_blank">
    <div class="thumb">Превью видео</div>
    <div class="title">ТЕСТ</div>
</a>

</div>

</body>
</html>
