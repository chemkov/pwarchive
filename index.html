<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Архив стримов</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f0f0f;
    color: white;
}

header {
    padding: 20px;
    text-align: center;
    font-size: 26px;
    background: #181818;
}

.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 15px;
    padding: 20px;
}

.card {
    background: #1e1e1e;
    border-radius: 12px;
    overflow: hidden;
    transition: 0.2s;
}

.card:hover {
    transform: scale(1.03);
}

.card img {
    width: 100%;
}

.info {
    padding: 10px;
}

.title {
    font-size: 16px;
    margin-bottom: 10px;
}

a button {
    width: 100%;
    padding: 10px;
    border: none;
    background: #ff0000;
    color: white;
    cursor: pointer;
    font-size: 14px;
}

a button:hover {
    background: #cc0000;
}
</style>

</head>

<body>

<header>
📺 Архив стримов
</header>

<div class="container" id="list"></div>

<script>

// 👉 СЮДА ДОБАВЛЯЕШЬ СТРИМЫ
const streams = [
    {
        title: "Стрим #1 — смешные моменты",
        video: "https://www.youtube.com/watch?v=VIDEO_ID1",
        img: "https://img.youtube.com/vi/VIDEO_ID1/hqdefault.jpg"
    },
    {
        title: "Стрим #2 — прохождение",
        video: "https://www.youtube.com/watch?v=VIDEO_ID2",
        img: "https://img.youtube.com/vi/VIDEO_ID2/hqdefault.jpg"
    }
];

const list = document.getElementById("list");

streams.forEach(s => {
    list.innerHTML += `
        <div class="card">
            <img src="${s.img}">
            <div class="info">
                <div class="title">${s.title}</div>
                <a href="${s.video}" target="_blank">
                    <button>Смотреть</button>
                </a>
            </div>
        </div>
    `;
});

</script>

</body>
</html>
